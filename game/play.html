    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    background: #1a1a2e;
    overflow: hidden;
    font-family: 'Noto Sans JP', sans-serif;
    touch-action: none;
}

body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
}

#game-wrap {
    position: relative;
    width: min(96vw, calc(96vh * 960 / 544 - 60px));
    aspect-ratio: 960 / 544;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
    border-radius: 6px;
    overflow: hidden;
}

#game {
    width: 100%;
    height: 100%;
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #5c94fc;
}

#help {
    color: #8888aa;
    font-size: 12px;
    letter-spacing: 1px;
    text-align: center;
    padding: 0 10px;
}

/* ---- タッチ操作 (タッチデバイスのみ、ゲーム画面の下に表示) ---- */
#touch-controls {
    display: none;
    width: min(96vw, calc(96vh * 960 / 544 - 60px));
    justify-content: space-between;
    align-items: center;
}

@media (pointer: coarse) {
    #touch-controls {
        display: flex;
    }

    /* ボタンの分の高さを確保してはみ出しを防ぐ */
    #game-wrap,
    #touch-controls {
        width: min(96vw, calc((100vh - 130px) * 960 / 544));
    }

    /* スマホではキーボード説明は不要 */
    #help {
        display: none;
    }
}

.tc-group {
    display: flex;
    gap: 16px;
}

.tc-btn {
    width: 64px;
    height: 64px;
    border: 2px solid rgba(255, 255, 255, 0.5);
    border-radius: 12px;
    background: rgba(0, 0, 0, 0.30);
    color: rgba(255, 255, 255, 0.85);
    font-size: 22px;
    font-weight: bold;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
}

.tc-round { border-radius: 50%; }

.tc-btn:active {
    background: rgba(255, 255, 255, 0.35);
}

'use strict';

// ===== js/level.js =====
// タイルマップ式のレベル管理
const TS = 32;            // タイル1辺のピクセル数
const ROWS = 17;          // 画面の縦タイル数

const T = {
    EMPTY: 0, GROUND: 1, BRICK: 2, QUESTION: 3, USED: 4, HARD: 5,
    PIPE_TL: 6, PIPE_TR: 7, PIPE_L: 8, PIPE_R: 9,
    COIN: 10, POLE: 11, POLE_TOP: 12,
};

const SOLID = new Set([
    T.GROUND, T.BRICK, T.QUESTION, T.USED, T.HARD,
    T.PIPE_TL, T.PIPE_TR, T.PIPE_L, T.PIPE_R,
]);

const GROUND_Y = 15;      // 地面の上端の行

// レベルデータを組み立てるためのビルダー
class Builder {
    constructor(level) { this.level = level; }

    set(x, y, id) {
        if (x < 0 || x >= this.level.width || y < 0 || y >= ROWS) return;
        this.level.grid[y * this.level.width + x] = id;
    }

    // x0〜x1 (両端含む) に地面を敷く
    ground(x0, x1, topY = GROUND_Y) {
        for (let x = x0; x <= x1; x++)
            for (let y = topY; y < ROWS; y++) this.set(x, y, T.GROUND);
    }

    row(id, x0, x1, y) {
        for (let x = x0; x <= x1; x++) this.set(x, y, id);
    }

    brick(x, y) { this.set(x, y, T.BRICK); }
    bricks(x0, x1, y) { this.row(T.BRICK, x0, x1, y); }
    hard(x, y) { this.set(x, y, T.HARD); }

    // ハテナブロック content: 'coin' | 'power' | 'life'
    q(x, y, content = 'coin') {
        this.set(x, y, T.QUESTION);
        this.level.contents.set(`${x},${y}`, content);
    }

    coin(x, y) { this.set(x, y, T.COIN); }
    coins(x0, x1, y) { this.row(T.COIN, x0, x1, y); }

    // 土管 (幅2タイル・高さ h タイル)
    pipe(x, h, topY = GROUND_Y) {
        for (let i = 0; i < h; i++) {
            const y = topY - 1 - i;
            const top = i === h - 1;
            this.set(x, y, top ? T.PIPE_TL : T.PIPE_L);
            this.set(x + 1, y, top ? T.PIPE_TR : T.PIPE_R);
        }
    }

    // 上り階段 (硬いブロック)
    stairsUp(x, h, baseY = GROUND_Y) {
        for (let i = 0; i < h; i++)
            for (let j = 0; j <= i; j++) this.set(x + i, baseY - 1 - j, T.HARD);
    }

    // 下り階段
    stairsDown(x, h, baseY = GROUND_Y) {
        for (let i = 0; i < h; i++)
            for (let j = 0; j < h - i; j++) this.set(x + i, baseY - 1 - j, T.HARD);
    }

    enemy(type, x, y = GROUND_Y - 1) {
        this.level.spawns.push({ type, x: x * TS, y: y * TS });
    }

    // ゴール: 旗 + 城
    goal(x, baseY = GROUND_Y) {
        this.stairsUp(x - 9, 8, baseY);
        for (let y = baseY - 10; y < baseY; y++) this.set(x, y, T.POLE);
        this.set(x, baseY - 11, T.POLE_TOP);
        this.level.flagX = x;
        this.level.castleX = x + 6;
    }

    decor(kind, x, extra = 0) {
        this.level.decor.push({ kind, x: x * TS, extra });
    }
}

class Level {
    constructor(data) {
        this.name = data.name;
        this.theme = data.theme;
        this.music = data.music || 'overworld';
        this.width = data.width;
        this.time = data.time || 300;
        this.bossLevel = !!data.boss;
        this.grid = new Uint8Array(this.width * ROWS);
        this.contents = new Map();
        this.spawns = [];
        this.decor = [];
        this.flagX = this.width - 5;
        this.castleX = this.width - 3;
        this.playerSpawn = data.playerSpawn || { x: 3 * TS, y: (GROUND_Y - 2) * TS };
        data.build(new Builder(this));
        this.pixelWidth = this.width * TS;
        this.pixelHeight = ROWS * TS;
    }

    tileAt(col, row) {
        if (col < 0 || col >= this.width || row < 0 || row >= ROWS) return T.EMPTY;
        return this.grid[row * this.width + col];
    }

    setTile(col, row, id) {
        if (col < 0 || col >= this.width || row < 0 || row >= ROWS) return;
        this.grid[row * this.width + col] = id;
    }

    isSolid(col, row) {
        if (col < 0 || col >= this.width) return true;  // 左右の壁
        if (row < 0 || row >= ROWS) return false;        // 上下は抜ける(穴)
        return SOLID.has(this.grid[row * this.width + col]);
    }
}

// AABB をタイルに対して移動・衝突解決する共通ルーチン
// entity: {x, y, w, h, vx, vy} を直接書き換え、結果フラグを返す
function moveAndCollide(e, level, dt) {
    const res = { ground: false, ceiling: false, wall: false, headTiles: [] };

    // --- X 軸 ---
    e.x += e.vx * dt;
    if (e.vx > 0) {
        const col = Math.floor((e.x + e.w) / TS);
        for (let row = Math.floor(e.y / TS); row <= Math.floor((e.y + e.h - 1) / TS); row++) {
            if (level.isSolid(col, row)) {
                e.x = col * TS - e.w - 0.01;
                e.vx = 0;
                res.wall = true;
                break;
            }
        }
    } else if (e.vx < 0) {
        const col = Math.floor(e.x / TS);
        for (let row = Math.floor(e.y / TS); row <= Math.floor((e.y + e.h - 1) / TS); row++) {
            if (level.isSolid(col, row)) {
                e.x = (col + 1) * TS + 0.01;
                e.vx = 0;
                res.wall = true;
                break;
            }
        }
    }

    // --- Y 軸 ---
    e.y += e.vy * dt;
    if (e.vy > 0) {
        const row = Math.floor((e.y + e.h) / TS);
        for (let col = Math.floor((e.x + 2) / TS); col <= Math.floor((e.x + e.w - 3) / TS); col++) {
            if (level.isSolid(col, row)) {
                e.y = row * TS - e.h - 0.01;
                e.vy = 0;
                res.ground = true;
                break;
            }
        }
    } else if (e.vy < 0) {
        const row = Math.floor(e.y / TS);
        for (let col = Math.floor((e.x + 2) / TS); col <= Math.floor((e.x + e.w - 3) / TS); col++) {
            if (level.isSolid(col, row)) {
                e.y = (row + 1) * TS + 0.01;
                e.vy = 0;
                res.ceiling = true;
                res.headTiles.push({ col, row });
            }
        }
    }
    return res;
}

// 接地しているかどうかの判定 (足元 1px 下にソリッドがあるか)
function onGround(e, level) {
    const row = Math.floor((e.y + e.h + 1) / TS);
    for (let col = Math.floor((e.x + 2) / TS); col <= Math.floor((e.x + e.w - 3) / TS); col++) {
        if (level.isSolid(col, row)) return true;
    }
    return false;
}

// ===== js/sprites.js =====
// 全てのグラフィックをコードで生成する (画像ファイル不要のオリジナルドット絵)
const SCALE = 2;

// 文字列のドット絵 → オフスクリーンキャンバス
function px(rows, palette, scale = SCALE) {
    const h = rows.length;
    const w = rows[0].length;
    const cv = document.createElement('canvas');
    cv.width = w * scale;
    cv.height = h * scale;
    const c = cv.getContext('2d');
    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            const ch = rows[y][x];
            if (ch === '.' || ch === ' ') continue;
            c.fillStyle = palette[ch] || '#f0f';
            c.fillRect(x * scale, y * scale, scale, scale);
        }
    }
    return cv;
}

function flipped(img) {
    const cv = document.createElement('canvas');
    cv.width = img.width;
    cv.height = img.height;
    const c = cv.getContext('2d');
    c.translate(img.width, 0);
    c.scale(-1, 1);
    c.drawImage(img, 0, 0);
    return cv;
}

function drawTile(c, id, x, y, theme, t) {
    const th = THEMES[theme];
    switch (id) {
        case T.GROUND:
            c.fillStyle = th.groundA;
            c.fillRect(x, y, TS, TS);
            c.fillStyle = th.groundTop;
            c.fillRect(x, y, TS, 4);
            c.fillStyle = th.groundB;
            c.fillRect(x, y + TS - 4, TS, 4);
            c.fillRect(x + TS - 3, y, 3, TS);
            break;
        case T.BRICK:
            c.fillStyle = th.brick;
            c.fillRect(x, y, TS, TS);
            c.fillStyle = th.brickLine;
            c.fillRect(x, y, TS, 2);
            c.fillRect(x, y + 15, TS, 2);
            c.fillRect(x, y + 30, TS, 2);
            c.fillRect(x + 15, y, 2, 16);
            c.fillRect(x + 3, y + 16, 2, 16);
            c.fillRect(x + 26, y + 16, 2, 16);
            break;
        case T.QUESTION: {
            const pulse = Math.sin(t * 5) > 0.3 ? '#ffd24a' : '#f0a500';
            c.fillStyle = pulse;
            c.fillRect(x, y, TS, TS);
            c.fillStyle = '#8a5a00';
            c.strokeStyle = '#8a5a00';
            c.lineWidth = 2;
            c.strokeRect(x + 2, y + 2, TS - 4, TS - 4);
            c.fillStyle = '#7a3a00';
            c.font = 'bold 22px monospace';
            c.textAlign = 'center';
            c.textBaseline = 'middle';
            c.fillText('?', x + TS / 2, y + TS / 2 + 1);
            break;
        }
        case T.USED:
            c.fillStyle = '#8a5a3a';
            c.fillRect(x, y, TS, TS);
            c.fillStyle = '#6a4028';
            c.fillRect(x + 2, y + 2, TS - 4, TS - 4);
            break;
        case T.HARD:
            c.fillStyle = th.hard;
            c.fillRect(x, y, TS, TS);
            c.fillStyle = '#ffffff44';
            c.fillRect(x, y, TS, 4);
            c.fillRect(x, y, 4, TS);
            c.fillStyle = '#00000044';
            c.fillRect(x, y + TS - 4, TS, 4);
            c.fillRect(x + TS - 4, y, 4, TS);
            break;
        case T.PIPE_TL:
        case T.PIPE_TR: {
            const [pa, pb, pd] = th.pipe || ['#2d9a2d', '#67d040', '#175a17'];
            const left = id === T.PIPE_TL;
            c.fillStyle = pa;
            c.fillRect(x - (left ? 0 : 4), y, TS + 4, TS);
            c.fillStyle = pb;
            c.fillRect(x + (left ? 4 : -2), y, 6, TS);
            c.fillStyle = pd;
            c.fillRect(x, y, left ? 2 : 0, TS);
            if (!left) c.fillRect(x + TS - 2, y, 2, TS);
            c.fillStyle = pd;
            c.fillRect(x - (left ? 0 : 4), y, TS + 4, 3);
            c.fillRect(x - (left ? 0 : 4), y + TS - 3, TS + 4, 3);
            break;
        }
        case T.PIPE_L:
        case T.PIPE_R: {
            const [pa, pb, pd] = th.pipe || ['#2d9a2d', '#67d040', '#175a17'];
            const left = id === T.PIPE_L;
            c.fillStyle = pa;
            c.fillRect(x + (left ? 2 : 0), y, TS - 2, TS);
            c.fillStyle = pb;
            c.fillRect(x + (left ? 6 : 0), y, 6, TS);
            c.fillStyle = pd;
            if (left) c.fillRect(x + 2, y, 2, TS);
            else c.fillRect(x + TS - 4, y, 2, TS);
            break;
        }
        case T.COIN:
            drawCoin(c, x + TS / 2, y + TS / 2, t);
            break;
        case T.POLE:
            c.fillStyle = '#3fae3f';
            c.fillRect(x + TS / 2 - 3, y, 6, TS);
            c.fillStyle = '#a8e8a8';
            c.fillRect(x + TS / 2 - 3, y, 2, TS);
            break;
        case T.POLE_TOP:
            c.fillStyle = '#3fae3f';
            c.fillRect(x + TS / 2 - 3, y + 10, 6, TS - 10);
            c.fillStyle = '#e8d860';
            c.beginPath();
            c.arc(x + TS / 2, y + 8, 7, 0, Math.PI * 2);
            c.fill();
            break;
    }
}

function drawCoin(c, cx, cy, t, r = 11) {
    const w = Math.abs(Math.cos(t * 5)) * r;
    c.fillStyle = '#ffd24a';
    c.beginPath();
    c.ellipse(cx, cy, Math.max(2, w), r, 0, 0, Math.PI * 2);
    c.fill();
    c.fillStyle = '#b8860b';
    c.beginPath();
    c.ellipse(cx, cy, Math.max(1, w * 0.55), r * 0.6, 0, 0, Math.PI * 2);
    c.fill();
}

    c.beginPath();
    c.arc(x + Math.cos(t * 20) * 2, y + Math.sin(t * 20) * 2, 3.5, 0, Math.PI * 2);

// キーボード & タッチ入力をまとめて管理する
class Input {
    constructor() {
        this.down = new Set();      // 現在押されているアクション
        this.pressed = new Set();   // このフレームで押されたアクション

        const KEYMAP = {
            ArrowLeft: 'left', KeyA: 'left',
            ArrowRight: 'right', KeyD: 'right',
            ArrowUp: 'jump', KeyW: 'jump', Space: 'jump', KeyZ: 'jump',
            ArrowDown: 'down', KeyS: 'down',
            ShiftLeft: 'run', ShiftRight: 'run', KeyX: 'run',
            Enter: 'start', Escape: 'start',
            KeyM: 'mute',
            Digit1: 'lv1', Digit2: 'lv2', Digit3: 'lv3', Digit4: 'lv4',
            Numpad1: 'lv1', Numpad2: 'lv2', Numpad3: 'lv3', Numpad4: 'lv4',
        };

        window.addEventListener('keydown', (e) => {
            const action = KEYMAP[e.code];
            if (!action) return;
            e.preventDefault();
            if (!this.down.has(action)) this.pressed.add(action);
            this.down.add(action);
        });

        window.addEventListener('keyup', (e) => {
            const action = KEYMAP[e.code];
            if (!action) return;
            this.down.delete(action);
        });

        window.addEventListener('blur', () => this.down.clear());

        this.bindTouch('tc-left', 'left');
        this.bindTouch('tc-right', 'right');
        this.bindTouch('tc-jump', 'jump');
        this.bindTouch('tc-run', 'run');
    }

    bindTouch(id, action) {
        const el = document.getElementById(id);
        if (!el) return;
        const press = (e) => {
            e.preventDefault();
            if (!this.down.has(action)) this.pressed.add(action);
            this.down.add(action);
        };
        const release = (e) => {
            e.preventDefault();
            this.down.delete(action);
        };
        el.addEventListener('touchstart', press, { passive: false });
        el.addEventListener('touchend', release, { passive: false });
        el.addEventListener('touchcancel', release, { passive: false });
        el.addEventListener('mousedown', press);
        el.addEventListener('mouseup', release);
    }

    held(action) { return this.down.has(action); }
    justPressed(action) { return this.pressed.has(action); }

    // 毎フレーム最後に呼ぶ
    update() { this.pressed.clear(); }
}

    N.C3, null, N.G3, null, N.A3, null, N.E3, null, N.F3, null, N.G3, null, N.C3, null, null, null,

const UNDERGROUND_MELODY = [
    N.C4, N.C5, N.A4, null, N.A4, N.C5, null, null, N.E4, N.E5, N.C5, null, N.C5, N.E5, null, null,
    N.D4, N.D5, N.B4, null, N.B4, N.D5, null, null, N.F4, N.F5, N.D5, null, N.D5, N.F5, null, null,
];
const UNDERGROUND_BASS = [
    N.C2, null, null, null, N.A2, null, null, null, N.C3, null, null, null, N.A2, null, null, null,
    N.G2, null, null, null, N.B3, null, null, null, N.F2, null, null, null, N.G2, null, null, null,
];

class Sound {
    constructor() {
        this.ctx = null;
        this.muted = false;
        this.musicTimer = null;
        this.musicStep = 0;
        this.musicNextTime = 0;
        this.currentTrack = null;
    }

    // ブラウザの自動再生制限のため、最初のユーザー操作後に呼ぶ
    init() {
        if (this.ctx) {
            if (this.ctx.state === 'suspended') this.ctx.resume();
            return;
        }
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;
        this.ctx = new AC();
        this.master = this.ctx.createGain();
        this.master.gain.value = 0.35;
        this.master.connect(this.ctx.destination);
        this.musicGain = this.ctx.createGain();
        this.musicGain.gain.value = 0.5;
        this.musicGain.connect(this.master);
    }

    toggleMute() {
        this.muted = !this.muted;
        if (this.master) this.master.gain.value = this.muted ? 0 : 0.35;
        return this.muted;
    }

    tone({ freq, freqEnd, time = 0, dur = 0.1, type = 'square', vol = 0.5, dest }) {
        if (!this.ctx) return;
        const t0 = this.ctx.currentTime + time;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, t0);
        if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, t0 + dur);
        gain.gain.setValueAtTime(vol, t0);
        gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
        osc.connect(gain).connect(dest || this.master);
        osc.start(t0);
        osc.stop(t0 + dur + 0.02);
    }

    noise({ time = 0, dur = 0.2, vol = 0.3 }) {
        if (!this.ctx) return;
        const t0 = this.ctx.currentTime + time;
        const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * dur, this.ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
        const src = this.ctx.createBufferSource();
        src.buffer = buf;
        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(vol, t0);
        gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
        src.connect(gain).connect(this.master);
        src.start(t0);
    }

    // ---- 効果音 ----
    jump()     { this.tone({ freq: 240, freqEnd: 700, dur: 0.18, type: 'square', vol: 0.35 }); }
    stomp()    { this.tone({ freq: 300, freqEnd: 80, dur: 0.12, type: 'square', vol: 0.4 }); this.noise({ dur: 0.08, vol: 0.15 }); }
    coin()     { this.tone({ freq: midi(83), dur: 0.07, vol: 0.35 }); this.tone({ freq: midi(88), time: 0.07, dur: 0.35, vol: 0.35 }); }
    bump()     { this.tone({ freq: 120, freqEnd: 70, dur: 0.1, type: 'square', vol: 0.4 }); }
    breakBlock() { this.noise({ dur: 0.25, vol: 0.4 }); this.tone({ freq: 200, freqEnd: 60, dur: 0.2, type: 'sawtooth', vol: 0.25 }); }
    sprout()   { for (let i = 0; i < 6; i++) this.tone({ freq: 200 + i * 90, time: i * 0.04, dur: 0.06, vol: 0.25 }); }
    powerup()  { const seq = [60, 64, 67, 72, 76, 79, 84]; seq.forEach((n, i) => this.tone({ freq: midi(n), time: i * 0.06, dur: 0.09, vol: 0.3 })); }
    oneUp()    { const seq = [64, 67, 76, 72, 74, 79]; seq.forEach((n, i) => this.tone({ freq: midi(n), time: i * 0.09, dur: 0.12, vol: 0.3 })); }
    hurt()     { this.tone({ freq: 500, freqEnd: 100, dur: 0.3, type: 'sawtooth', vol: 0.3 }); }
    kick()     { this.tone({ freq: 400, freqEnd: 900, dur: 0.08, type: 'square', vol: 0.35 }); }
    fireball() { this.tone({ freq: 700, freqEnd: 200, dur: 0.1, type: 'sawtooth', vol: 0.25 }); }
    die() {
        this.stopMusic();
        const seq = [72, 71, 70, 69, 67, 60, 55, 48];
        seq.forEach((n, i) => this.tone({ freq: midi(n), time: 0.1 + i * 0.11, dur: 0.12, type: 'triangle', vol: 0.4 }));
    }
    flagpole() {
        const seq = [55, 58, 60, 62, 65, 67, 70, 72, 74];
        seq.forEach((n, i) => this.tone({ freq: midi(n), time: i * 0.07, dur: 0.1, vol: 0.3 }));
    }
    clear() {
        this.stopMusic();
        const seq = [60, 64, 67, 72, 76, 79, 84, 79, 76, 72, 76, 79, 84];
        seq.forEach((n, i) => this.tone({ freq: midi(n), time: i * 0.13, dur: 0.16, type: 'square', vol: 0.3 }));
    }
    gameOver() {
        this.stopMusic();
        const seq = [72, 67, 64, 60, 62, 59, 55, 48];
        seq.forEach((n, i) => this.tone({ freq: midi(n), time: i * 0.2, dur: 0.25, type: 'triangle', vol: 0.35 }));
    }

    // ---- BGM (簡易ステップシーケンサー) ----
    playMusic(track = 'overworld') {
        if (!this.ctx) return;
        this.stopMusic();
        this.currentTrack = track;
        this.musicStep = 0;
        this.musicNextTime = this.ctx.currentTime + 0.05;
        this.musicTimer = setInterval(() => this.scheduleMusic(), 60);
    }

    scheduleMusic() {
        if (!this.ctx) return;
        const stepDur = this.currentTrack === 'underground' ? 0.16 : 0.13;
        const melody = this.currentTrack === 'underground' ? UNDERGROUND_MELODY : OVERWORLD_MELODY;
        const bass = this.currentTrack === 'underground' ? UNDERGROUND_BASS : OVERWORLD_BASS;
        while (this.musicNextTime < this.ctx.currentTime + 0.25) {
            const i = this.musicStep % melody.length;
            const t = this.musicNextTime - this.ctx.currentTime;
            const m = melody[i];
            const b = bass[i % bass.length];
            if (m) this.tone({ freq: midi(m), time: t, dur: stepDur * 0.9, type: 'square', vol: 0.18, dest: this.musicGain });
            if (b) this.tone({ freq: midi(b), time: t, dur: stepDur * 1.6, type: 'triangle', vol: 0.25, dest: this.musicGain });
            this.musicNextTime += stepDur;
            this.musicStep++;
        }
    }

    stopMusic() {
        if (this.musicTimer) {
            clearInterval(this.musicTimer);
            this.musicTimer = null;
        }
    }
}

// プレイヤーを追いかける横スクロールカメラ
class Camera {
    constructor(viewW, viewH) {
        this.x = 0;
        this.y = 0;
        this.viewW = viewW;
        this.viewH = viewH;
        this.shake = 0;
    }

    follow(target, level, dt) {
        // 画面の 40% 地点にプレイヤーを置く
        const goal = target.x + target.w / 2 - this.viewW * 0.4;
        this.x += (goal - this.x) * Math.min(1, dt * 10);
        this.x = Math.max(0, Math.min(this.x, level.pixelWidth - this.viewW));
        if (this.shake > 0) this.shake -= dt;
    }

    kick(amount = 0.15) { this.shake = amount; }

    offsetX() {
        return Math.round(this.x + (this.shake > 0 ? (Math.random() - 0.5) * 8 : 0));
    }
}

// レンガの破片・キラキラ・花火などの簡易パーティクル
class Particles {
    constructor() {
        this.list = [];
    }

    spawn({ x, y, vx = 0, vy = 0, life = 0.6, size = 6, color = '#fff', gravity = 1600, shape = 'rect' }) {
        this.list.push({ x, y, vx, vy, life, maxLife: life, size, color, gravity, shape });
    }

    // レンガを壊したときの破片
    brickBreak(x, y, color) {
        for (const [dx, dy] of [[-1, -1], [1, -1], [-1, -0.4], [1, -0.4]]) {
            this.spawn({
                x, y,
                vx: dx * (120 + Math.random() * 80),
                vy: dy * (380 + Math.random() * 120),
                life: 1, size: 10, color,
            });
        }
    }

    // 踏みつけ時の土煙
    puff(x, y) {
        for (let i = 0; i < 6; i++) {
            this.spawn({
                x: x + (Math.random() - 0.5) * 20, y,
                vx: (Math.random() - 0.5) * 120,
                vy: -Math.random() * 80,
                life: 0.35, size: 5, color: '#ffffffaa', gravity: 0, shape: 'circle',
            });
        }
    }

    sparkle(x, y, color = '#ffd24a') {
        for (let i = 0; i < 8; i++) {
            const a = Math.random() * Math.PI * 2;
            const sp = 60 + Math.random() * 120;
            this.spawn({
                x, y,
                vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
                life: 0.5, size: 4, color, gravity: 300, shape: 'circle',
            });
        }
    }

    firework(x, y) {
        const colors = ['#ff5050', '#ffd24a', '#50c0ff', '#80ff80', '#ff90e0'];
        const color = colors[Math.floor(Math.random() * colors.length)];
        for (let i = 0; i < 24; i++) {
            const a = (i / 24) * Math.PI * 2;
            const sp = 120 + Math.random() * 80;
            this.spawn({
                x, y,
                vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
                life: 1, size: 4, color, gravity: 250, shape: 'circle',
            });
        }
    }

    update(dt) {
        for (const p of this.list) {
            p.life -= dt;
            p.vy += p.gravity * dt;
            p.x += p.vx * dt;
            p.y += p.vy * dt;
        }
        this.list = this.list.filter((p) => p.life > 0);
    }

    render(c, camX) {
        for (const p of this.list) {
            c.globalAlpha = Math.max(0, p.life / p.maxLife);
            c.fillStyle = p.color;
            const s = p.size;
            if (p.shape === 'circle') {
                c.beginPath();
                c.arc(p.x - camX, p.y, s / 2, 0, Math.PI * 2);
                c.fill();
            } else {
                c.fillRect(p.x - camX - s / 2, p.y - s / 2, s, s);
            }
        }
        c.globalAlpha = 1;
    }
}

// キノコ / 1UP: ブロックからせり上がってから歩き出す
class Mushroom {
    constructor(col, row, kind = 'power') {
        this.w = 26;
        this.h = 26;
        this.x = col * TS + (TS - this.w) / 2;
        this.y = row * TS + TS - this.h;
        this.kind = kind;             // power | life
        this.vx = 0;
        this.vy = 0;
        this.emerge = TS;             // せり上がる残り距離
        this.dir = 1;
        this.removed = false;
    }
    update(dt, level) {
        if (this.emerge > 0) {
            const step = 40 * dt;
            this.y -= step;
            this.emerge -= step;
            return;
        }
        this.vx = (this.kind === 'life' ? 110 : 75) * this.dir;
        this.vy = Math.min(this.vy + 2200 * dt, 900);
        const res = moveAndCollide(this, level, dt);
        if (res.wall) this.dir *= -1;
        if (this.y > level.pixelHeight + 100) this.removed = true;
    }
    render(c, camX) {
        const img = this.kind === 'life' ? sprites.oneup : sprites.mushroom;
        c.drawImage(img, Math.round(this.x + this.w / 2 - img.width / 2 - camX),
            Math.round(this.y + this.h - img.height + 6));
    }
}

// 敵の共通ベース
class Enemy {
    constructor(x, y, w, h) {
        this.x = x + (TS - w) / 2;
        this.y = y + TS - h;
        this.w = w;
        this.h = h;
        this.vx = 0;
        this.vy = 0;
        this.alive = true;
        this.removed = false;
        this.active = false;     // 画面内に入ったら動き出す
        this.anim = 0;
        this.dir = -1;
    }

    // 踏まれた以外の理由 (甲羅・ファイア・ブロック突き上げ) でやられた
    flip(game, dir = 1) {
        this.alive = false;
        this.flipped = true;
        this.vy = -420;
        this.vx = 130 * dir;
        game.addScore(100, this.x, this.y);
    }

    baseUpdate(dt, level) {
        this.vy = Math.min(this.vy + 2200 * dt, 900);
        if (this.flipped) {
            // ひっくり返って落ちていくだけ (地形を無視)
            this.x += this.vx * dt;
            this.y += this.vy * dt;
            if (this.y > level.pixelHeight + 100) this.removed = true;
            return null;
        }
        return moveAndCollide(this, level, dt);
    }

    drawImg(c, img, camX) {
        const dx = Math.round(this.x + this.w / 2 - img.width / 2 - camX);
        const dy = Math.round(this.y + this.h - img.height + 2);
        if (this.flipped) {
            c.save();
            c.translate(dx + img.width / 2, dy + img.height / 2);
            c.scale(1, -1);
            c.drawImage(img, -img.width / 2, -img.height / 2);
            c.restore();
        } else {
            c.drawImage(img, dx, dy);
        }
    }
}

            return;
        }
        const res = this.baseUpdate(dt, level);
        if (!res) return;
        this.vx = this.speed * this.dir;
        if (res.wall) this.dir *= -1;
        if (this.y > level.pixelHeight + 100) this.removed = true;
    }

    stomp(game) {
        this.alive = false;
        this.squashed = 0.5;
        this.vx = 0;
        game.sound.stomp();
        game.addScore(100, this.x, this.y);
    }

    render(c, camX) {
        let img;
        if (this.squashed > 0) img = sprites.kuriFlat.right;
        else img = (Math.floor(this.anim * 6) % 2 === 0) ? sprites.kuri1.right : sprites.kuri2.right;
        this.drawImg(c, img, camX);

// カメッキー: 踏むと甲羅になり、蹴ると滑っていく
class Kame extends Enemy {
    constructor(x, y) {
        super(x, y, 26, 30);
        this.speed = 45;
        this.state = 'walk';      // walk | shell | sliding
        this.wakeTimer = 0;
        this.ignorePlayer = 0;    // 蹴った直後にすぐ当たらないように
    }

    update(dt, level) {
        this.anim += dt;
        if (this.ignorePlayer > 0) this.ignorePlayer -= dt;
        const res = this.baseUpdate(dt, level);
        if (!res) return;

        if (this.state === 'walk') {
            this.vx = this.speed * this.dir;
            if (res.wall) this.dir *= -1;
            // 崖の手前で引き返す
            if (res.ground || onGround(this, level)) {
                const aheadX = this.dir > 0 ? this.x + this.w + 2 : this.x - 2;
                const col = Math.floor(aheadX / TS);
                const row = Math.floor((this.y + this.h + 2) / TS);
                if (!level.isSolid(col, row)) this.dir *= -1;
            }
        } else if (this.state === 'shell') {
            this.vx = 0;
            this.wakeTimer -= dt;
            if (this.wakeTimer <= 0) {
                this.state = 'walk';
                this.h = 30;
                this.y -= 8;
            }
        } else if (this.state === 'sliding') {
            this.vx = 320 * this.dir;
            if (res.wall) this.dir *= -1;
        }
        if (this.y > level.pixelHeight + 100) this.removed = true;
    }

    stomp(game, player) {
        if (this.state === 'walk') {
            this.state = 'shell';
            this.h = 22;
            this.y += 8;
            this.wakeTimer = 7;
            game.sound.stomp();
            game.addScore(100, this.x, this.y);
        } else if (this.state === 'sliding') {
            this.state = 'shell';
            this.wakeTimer = 7;
            game.sound.stomp();
        } else {
            // 止まっている甲羅を踏んだ → 蹴る
            this.kick(game, player.x + player.w / 2 < this.x + this.w / 2 ? 1 : -1);
        }
    }

    kick(game, dir) {
        this.state = 'sliding';
        this.dir = dir;
        this.ignorePlayer = 0.4;
        this.wakeTimer = 99;
        game.sound.kick();
        game.addScore(200, this.x, this.y);
    }

    render(c, camX) {
        let img;
        if (this.state === 'walk') {
            const frame = (Math.floor(this.anim * 6) % 2 === 0) ? sprites.kame1 : sprites.kame2;
            img = this.dir > 0 ? frame.left : frame.right;
        } else {
            img = sprites.shell.right;
        }
        this.drawImg(c, img, camX);
    }
}

// おすしちゃん: ちょこちょこ走って止まるを繰り返す白ハムスター
class Osushi extends Enemy {

        const res = this.baseUpdate(dt, level);
        if (!res) return;

        if (this.state === 'dash') {
            this.vx = this.speed * this.dir;
            if (res.wall) this.dir *= -1;
            // 崖の手前で引き返す
            if (res.ground || onGround(this, level)) {
                const aheadX = this.dir > 0 ? this.x + this.w + 2 : this.x - 2;
                const col = Math.floor(aheadX / TS);
                const row = Math.floor((this.y + this.h + 2) / TS);
                if (!level.isSolid(col, row)) this.dir *= -1;
            }
            this.timer -= dt;
            if (this.timer <= 0) {
                this.state = 'pause';
                this.vx = 0;
                this.timer = 0.35 + Math.random() * 0.35;
            }
        } else {
            this.vx = 0;
            this.timer -= dt;
            if (this.timer <= 0) {
                // 近くにいるプレイヤーの方へちょこちょこ走る
                if (player && Math.abs(player.x - this.x) < 340) {
                    this.dir = player.x > this.x ? 1 : -1;
                }
                this.state = 'dash';
                this.timer = 0.45 + Math.random() * 0.25;
            }
        }
        if (this.y > level.pixelHeight + 100) this.removed = true;
    }

    stomp(game) {
        this.alive = false;
        this.squashed = 0.5;
        this.vx = 0;
        game.sound.stomp();
        game.addScore(150, this.x, this.y);
    }

    render(c, camX) {
        let img;
        if (this.squashed > 0) img = sprites.osushiFlat.right;
        else if (this.state === 'dash') {
            img = (Math.floor(this.anim * 12) % 2 === 0) ? sprites.osushi1.right : sprites.osushi2.right;
        } else img = sprites.osushi1.right;
        this.drawImg(c, img, camX);
    }
}

// ルルちゃん: 重力も地形も無視して、8の字を描いて縦横無尽に飛び回る子犬
class Lulu extends Enemy {
    constructor(x, y) {
        super(x, y, 26, 26);
        this.cx = this.x;             // 飛行の中心
        this.cy = this.y - 70;
        this.t = Math.random() * Math.PI * 2;
        this.rx = 110;
        this.ry = 64;
        this.prevX = this.x;
    }

    update(dt, level) {
        this.anim += dt;
        if (this.flipped) {
            this.vy = Math.min(this.vy + 2200 * dt, 900);
            this.x += this.vx * dt;
            this.y += this.vy * dt;
            if (this.y > level.pixelHeight + 100) this.removed = true;
            return;
        }
        this.t += dt;
        this.prevX = this.x;
        this.x = this.cx + Math.cos(this.t * 1.6) * this.rx;
        this.y = Math.max(8, this.cy + Math.sin(this.t * 2.4) * this.ry);
    }

    stomp(game) {
        this.alive = false;
        this.flipped = true;
        this.vx = 0;
        this.vy = -320;
        game.sound.stomp();
        game.addScore(200, this.x, this.y);
    }

    render(c, camX) {
        const img = (Math.floor(this.anim * 8) % 2 === 0) ? sprites.lulu1.right : sprites.lulu2.right;
        this.drawImg(c, img, camX);
    }
}

// ゆいちゃんが投げるハート (放物線を描いて飛んでくる)
class HeartShot extends Enemy {
    constructor(x, y, vx) {
        super(x / TS * TS, y, 18, 18);
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = -360;
        this.active = true;
    }

    update(dt, level) {
        this.anim += dt;
        if (this.flipped) {
            this.vy = Math.min(this.vy + 2200 * dt, 900);
            this.y += this.vy * dt;
            if (this.y > level.pixelHeight + 100) this.removed = true;
            return;
        }
        this.vy = Math.min(this.vy + 1400 * dt, 700);
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        const col = Math.floor((this.x + this.w / 2) / TS);
        const row = Math.floor((this.y + this.h / 2) / TS);
        if (level.isSolid(col, row)) this.removed = true;
        if (this.y > level.pixelHeight + 60) this.removed = true;
    }

    stomp(game) {
        // 踏むと弾き返せる
        this.alive = false;
        this.flipped = true;
        this.vy = -250;
        game.sound.kick();
        game.addScore(100, this.x, this.y);
    }

    render(c, camX) {
        const wob = Math.sin(this.anim * 14) * 2;
        drawHeart(c, this.x + this.w / 2 - camX, this.y + this.h / 2 + wob, 11);
    }
}

// ボス: ゆいちゃん (ボブヘアの女の子)。3回踏むと なかなおり できる
class Yui extends Enemy {
    constructor(x, y) {
        super(x, y, 56, 86);
        this.boss = true;
        this.hp = 3;
        this.maxHp = 3;
        this.invuln = 0;
        this.defeated = false;
        this.jumpTimer = 2;
        this.throwTimer = 2.5;
        this.dir = -1;
    }

    update(dt, level, player, game) {
        this.anim += dt;
        if (this.invuln > 0) this.invuln -= dt;
        if (this.defeated) {
            // へたりこんで目を回している
            this.vx = 0;
            this.vy = Math.min(this.vy + 2200 * dt, 900);
            moveAndCollide(this, level, dt);
            return;
        }

        // 踏まれた直後はひるんで立ち止まる (逃げる隙を作る)
        const stunned = this.invuln > 0;
        const speed = 80 + (this.maxHp - this.hp) * 40;  // 怒るほど速くなる
        if (player && !stunned) this.dir = player.x + player.w / 2 > this.x + this.w / 2 ? 1 : -1;
        this.vx = stunned ? 0 : speed * this.dir;
        this.vy = Math.min(this.vy + 2200 * dt, 900);
        const res = moveAndCollide(this, level, dt);

        const grounded = res.ground || onGround(this, level);
        this.jumpTimer -= dt;
        if (grounded && !stunned && this.jumpTimer <= 0) {
            this.vy = -580;
            this.jumpTimer = 1.8 + Math.random() * 1.2;
        }

        // プレイヤーが遠いときはハートを投げる
        this.throwTimer -= dt;
        if (game && player && !stunned && this.throwTimer <= 0 &&
            Math.abs(player.x - this.x) > 140) {
            this.throwTimer = 2.4 + Math.random() * 0.8;
            const vx = (player.x > this.x ? 1 : -1) * (200 + Math.random() * 60);
            game.enemies.push(new HeartShot(this.x + this.w / 2, this.y + 6, vx));
            game.sound.kick();
        }
    }

    takeHit(game) {
        if (this.invuln > 0 || this.defeated) return;
        this.hp--;
        this.invuln = 1.2;
        game.sound.hurt();
        game.addScore(500, this.x, this.y);
        if (this.hp <= 0) {
            this.defeated = true;
            this.alive = false;        // 接触ダメージ停止
            this.vy = -350;
            game.addScore(5000, this.x, this.y - 20);
            game.onBossDefeated();
        }
    }

    stomp(game) { this.takeHit(game); }
    hitByFireball(game) { this.takeHit(game); }

    render(c, camX, time) {
        // 被弾中は点滅
        if (this.invuln > 0 && !this.defeated && Math.floor(this.anim * 12) % 2 === 0) return;
        let img;
        if (this.defeated) img = sprites.yuiDizzy.right;
        else img = (Math.floor(this.anim * 7) % 2 === 0) ? sprites.yui1.right : sprites.yui2.right;
        this.drawImg(c, img, camX);

        const cx = this.x + this.w / 2 - camX;
        if (this.defeated) {
            // 目を回している星
            for (let i = 0; i < 3; i++) {
                const a = this.anim * 4 + i * (Math.PI * 2 / 3);
                c.fillStyle = '#ffe060';
                c.beginPath();
                c.arc(cx + Math.cos(a) * 24, this.y - 8 + Math.sin(a) * 6, 3.5, 0, Math.PI * 2);
                c.fill();
            }
        } else {
            // HP ハート
            for (let i = 0; i < this.maxHp; i++) {
                drawHeart(c, cx - (this.maxHp - 1) * 9 + i * 18, this.y - 16, 9,
                    i < this.hp ? '#ff4060' : '#00000033');
            }
        }
    }
}

function createEnemy(type, x, y) {
    if (type === 'kuri') return new Kuri(x, y);
    if (type === 'kame') return new Kame(x, y);
    if (type === 'kiiro') return new Kiiro(x, y);
    if (type === 'osushi') return new Osushi(x, y);
    if (type === 'lulu') return new Lulu(x, y);
    if (type === 'yui') return new Yui(x, y);
    return null;
}

// ===== js/entities/player.js =====


const ACCEL = 1500;
const AIR_ACCEL = 1100;
const FRICTION = 1900;
const MAX_WALK = 185;
const MAX_RUN = 310;
const GRAVITY = 2450;
const HOLD_GRAVITY = 1280;   // ジャンプ長押し中の上昇時は重力を弱める
const MAX_FALL = 920;
const JUMP_V = -665;
const STOMP_BOUNCE = -420;
const COYOTE = 0.08;
const JUMP_BUFFER = 0.12;

class Player {
    constructor(x, y) {
        this.w = 22;
        this.x = x;
        this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.form = 'small';     // small | big | fire
        this.h = 28;
        this.facing = 1;
        this.grounded = false;
        this.coyote = 0;
        this.jumpBuf = 0;
        this.runAnim = 0;
        this.invuln = 0;         // ダメージ後の無敵時間
        this.dead = false;
        this.frozen = false;     // ゴール演出などで操作を止める
    }

    setForm(form) {
        const oldH = this.h;
        this.form = form;
        this.h = form === 'small' ? 28 : 56;
        this.y -= this.h - oldH;  // 足元の位置を保つ
    }

    hurt() {
        if (this.invuln > 0 || this.dead) return false;
        if (this.form === 'small') {
            this.dead = true;
            return true;          // 死亡
        }
        this.setForm(this.form === 'fire' ? 'big' : 'small');
        this.invuln = 2;
        return false;
    }

    update(dt, input, level, game) {
        if (this.dead) {
            // 死亡演出: その場で跳ねて落下
            this.vy = Math.min(this.vy + GRAVITY * dt, MAX_FALL);
            this.y += this.vy * dt;
            return;
        }

        const left = !this.frozen && input.held('left');
        const right = !this.frozen && input.held('right');
        const run = !this.frozen && input.held('run');
        const jumpHeld = !this.frozen && input.held('jump');
        if (!this.frozen && input.justPressed('jump')) this.jumpBuf = JUMP_BUFFER;

        const max = run ? MAX_RUN : MAX_WALK;
        const accel = this.grounded ? ACCEL : AIR_ACCEL;

        if (left && !right) {
            this.vx -= accel * dt;
            this.facing = -1;
        } else if (right && !left) {
            this.vx += accel * dt;
            this.facing = 1;
        } else if (this.grounded) {
            // 摩擦
            const f = FRICTION * dt;
            if (Math.abs(this.vx) <= f) this.vx = 0;
            else this.vx -= Math.sign(this.vx) * f;
        }
        this.vx = Math.max(-max, Math.min(max, this.vx));

        // ジャンプ (コヨーテタイム + 先行入力)
        this.coyote = this.grounded ? COYOTE : Math.max(0, this.coyote - dt);
        this.jumpBuf = Math.max(0, this.jumpBuf - dt);
        if (this.jumpBuf > 0 && this.coyote > 0) {
            this.vy = JUMP_V - Math.abs(this.vx) * 0.18; // 走っていると少し高く跳べる
            this.coyote = 0;
            this.jumpBuf = 0;
            game.sound.jump();
        }

        // 重力 (上昇中にボタンを押し続けていると高く跳べる)
        const g = (this.vy < 0 && jumpHeld) ? HOLD_GRAVITY : GRAVITY;
        this.vy = Math.min(this.vy + g * dt, MAX_FALL);

        const res = moveAndCollide(this, level, dt);
        this.grounded = res.ground || onGround(this, level);
        if (res.ground) this.vy = 0;

        // 頭上のブロックを叩いた
        if (res.headTiles.length) {
            // 中央に最も近いタイルを優先
            const cx = this.x + this.w / 2;
            res.headTiles.sort((a, b) =>
                Math.abs((a.col + 0.5) * TS - cx) - Math.abs((b.col + 0.5) * TS - cx));
            game.hitBlock(res.headTiles[0].col, res.headTiles[0].row, this);
        }

        if (this.invuln > 0) this.invuln -= dt;

        // アニメーション
        if (this.grounded && Math.abs(this.vx) > 10) {
            this.runAnim += Math.abs(this.vx) * dt * 0.06;
        }
    }

    stompBounce(held) {
        this.vy = held ? STOMP_BOUNCE * 1.3 : STOMP_BOUNCE;
    }

    currentSprite() {
        const set = sprites.dog[this.form];
        let img;
        if (!this.grounded) img = set.jump;
        else if (Math.abs(this.vx) > 10) img = (Math.floor(this.runAnim) % 2 === 0) ? set.run1 : set.run2;
        else img = set.idle;
        return this.facing >= 0 ? img.right : img.left;
    }

    render(c, camX, time) {
        if (this.invuln > 0 && Math.floor(time * 12) % 2 === 0 && !this.dead) return; // 点滅
        const img = this.currentSprite();
        const dx = Math.round(this.x + this.w / 2 - img.width / 2 - camX);
        const dy = Math.round(this.y + this.h - img.height + 2);
        c.drawImage(img, dx, dy);
    }
}

// 画面上部のスコア・コイン・残り時間など

class HUD {
    render(c, game) {
        c.save();
        c.font = 'bold 16px monospace';
        c.textBaseline = 'top';
        c.fillStyle = '#ffffff';
        c.shadowColor = 'rgba(0,0,0,0.6)';
        c.shadowOffsetX = 2;
        c.shadowOffsetY = 2;

        c.textAlign = 'left';
        c.fillText('MARON', 30, 12);
        c.fillText(String(game.score).padStart(7, '0'), 30, 32);

        drawCoin(c, 250, 28, 0.2, 8);
        c.fillText(`× ${String(game.coins).padStart(2, '0')}`, 264, 20);

        c.textAlign = 'center';
        c.fillText('WORLD', 480, 12);
        c.fillText(game.level ? game.level.name.replace('WORLD ', '') : '1-1', 480, 32);

        c.fillText('TIME', 700, 12);
        const t = Math.max(0, Math.ceil(game.time));
        c.fillStyle = t <= 50 ? '#ff7070' : '#ffffff';
        c.fillText(String(t).padStart(3, '0'), 700, 32);

        c.fillStyle = '#ffffff';
        c.textAlign = 'right';
        c.fillText(`まろん × ${game.lives}`, 930, 12);
        if (game.sound.muted) c.fillText('🔇', 930, 34);
        c.restore();
    }
}

// ===== js/main.js =====











const LEVELS = [LEVEL1_DATA, LEVEL2_DATA, LEVEL3_DATA, LEVEL4_DATA];

const STEP = 1 / 120;

class Game {
    constructor() {
        this.canvas = document.getElementById('game');
        this.ctx = this.canvas.getContext('2d');
        this.input = new Input();
        this.sound = new Sound();
        this.camera = new Camera(this.canvas.width, this.canvas.height);
        this.hud = new HUD();
        this.particles = new Particles();
        this.state = 'title';
        this.score = 0;
        this.coins = 0;
        this.lives = 3;
        this.levelIndex = 0;
        this.level = null;
        this.time = 0;
        this.elapsed = 0;        // アニメーション用の通算時間
        this.stateTimer = 0;
        this.bumps = [];         // 叩かれてバウンドするブロック
        this.best = Number(localStorage.getItem('maron-best') || 0);

        // デバッグ: URL に ?stage=4 を付けるとそのステージから開始できる
        this.startLevel = 0;
        try {
            const s = parseInt(new URLSearchParams(window.location.search).get('stage'), 10);
            if (s >= 1 && s <= LEVELS.length) this.startLevel = s - 1;
        } catch { /* location が無い環境では無視 */ }

        // ブラウザの自動再生制限の解除はユーザー操作イベント内で行う
        const unlock = () => this.sound.init();
        window.addEventListener('keydown', unlock);
        window.addEventListener('touchstart', unlock);
        window.addEventListener('mousedown', unlock);

        this.last = performance.now();
        this.acc = 0;
        requestAnimationFrame((t) => this.frame(t));
    }

    // ---------- 進行管理 ----------
    newGame(startLevel = this.startLevel) {
        this.score = 0;
        this.coins = 0;
        this.lives = 3;
        this.levelIndex = startLevel;
        this.loadLevel(startLevel);
    }

    loadLevel(i) {
        this.levelIndex = i;
        this.level = new Level(LEVELS[i]);
        this.player = new Player(this.level.playerSpawn.x, this.level.playerSpawn.y);
        this.enemies = this.level.spawns.map((s) => createEnemy(s.type, s.x, s.y));
        this.items = [];
        this.fireballs = [];
        this.popups = [];
        this.bumps = [];
        this.particles = new Particles();
        this.time = this.level.time;
        this.camera = new Camera(this.canvas.width, this.canvas.height);
        this.flagDone = false;
        this.playerHidden = false;
        this.state = 'playing';
        this.sound.playMusic(this.level.music);
    }

    addScore(points, x, y) {
        this.score += points;
        if (x !== undefined) this.popups.push(new ScorePopup(x, y, String(points)));
    }

    addCoin(x, y) {
        this.coins++;
        this.addScore(200);
        this.sound.coin();
        if (x !== undefined) this.particles.sparkle(x, y);
        if (this.coins >= 100) {
            this.coins -= 100;
            this.lives++;
            this.sound.oneUp();
            this.popups.push(new ScorePopup(this.player.x, this.player.y - 10, '1UP!'));
        }
    }

    // ---------- ブロックを下から叩いた ----------
    hitBlock(col, row, player) {
        const tile = this.level.tileAt(col, row);
        if (tile === T.QUESTION) {
            const content = this.level.contents.get(`${col},${row}`) || 'coin';
            this.level.setTile(col, row, T.USED);
            this.bumps.push({ col, row, t: 0 });
            if (content === 'coin') {
                this.items.push(new CoinPop(col * TS + TS / 2, row * TS - 8));
                this.addCoin();
            } else if (content === 'life') {
                this.items.push(new Mushroom(col, row, 'life'));
                this.sound.sprout();
            } else if (content === 'flower') {
                // 確定ファイアフラワー
                this.items.push(new Flower(col, row));
                this.sound.sprout();
            } else if (player.form === 'small') {
                this.items.push(new Mushroom(col, row, 'power'));
                this.sound.sprout();
            } else {
                this.items.push(new Flower(col, row));
                this.sound.sprout();
            }
        } else if (tile === T.BRICK) {
            if (player.form !== 'small') {
                this.level.setTile(col, row, T.EMPTY);
                this.particles.brickBreak(col * TS + TS / 2, row * TS + TS / 2, THEMES[this.level.theme].brick);
                this.addScore(50);
                this.sound.breakBlock();
                this.camera.kick();
            } else {
                this.bumps.push({ col, row, t: 0 });
                this.sound.bump();
            }
        } else if (tile === T.USED || tile === T.HARD || tile === T.GROUND) {
            this.sound.bump();
            return;
        } else {
            return;
        }
        // 叩いたブロックの上に乗っている敵を倒す
        for (const e of this.enemies) {
            if (!e.alive || e.flipped || e.boss) continue;
            const onTop = Math.abs(e.y + e.h - row * TS) < 6 &&
                e.x + e.w > col * TS - 4 && e.x < (col + 1) * TS + 4;
            if (onTop) {
                e.flip(this, e.x + e.w / 2 < col * TS + TS / 2 ? -1 : 1);
                this.sound.kick();
            }
        }
    }

    // ---------- 更新 ----------
    update(dt) {
        this.elapsed += dt;

        if (this.input.justPressed('mute')) this.sound.toggleMute();

        switch (this.state) {
            case 'title': {
                // デバッグ/ステージセレクト: 1〜4 キーで直接そのステージへ
                let selected = -1;
                for (let i = 0; i < LEVELS.length; i++) {
                    if (this.input.justPressed('lv' + (i + 1))) selected = i;
                }
                if (selected >= 0) {
                    this.sound.init();
                    this.newGame(selected);
                } else if (this.input.justPressed('start') || this.input.justPressed('jump')) {
                    this.sound.init();
                    this.newGame();
                }
                break;
            }
            case 'playing':
                this.updatePlaying(dt);
                break;
            case 'paused':
                if (this.input.justPressed('start')) this.state = 'playing';
                break;
            case 'dying':
                this.player.update(dt, this.input, this.level, this);
                this.stateTimer -= dt;
                if (this.stateTimer <= 0) {
                    this.lives--;
                    if (this.lives < 0) {
                        this.state = 'gameover';
                        this.stateTimer = 5;
                        this.saveBest();
                        this.sound.gameOver();
                    } else {
                        this.loadLevel(this.levelIndex);
                    }
                }
                break;
            case 'flag':
                this.updateFlag(dt);
                break;
            case 'clearwalk':
                this.updateClearWalk(dt);
                break;
            case 'clear':
                this.particles.update(dt);
                this.stateTimer -= dt;
                if (this.stateTimer <= 0) {
                    if (this.levelIndex + 1 < LEVELS.length) this.loadLevel(this.levelIndex + 1);
                    else {
                        this.state = 'win';
                        this.stateTimer = 0;
                        this.saveBest();
                    }
                }
                break;
            case 'bossclear':
                // ボス撃破演出: ゆいちゃんは目を回し、花火が上がる
                for (const e of this.enemies) {
                    if (e.boss) e.update(dt, this.level, this.player, this);
                }
                this.particles.update(dt);
                this.popups.forEach((s) => s.update(dt));
                this.popups = this.popups.filter((s) => !s.removed);
                if (Math.random() < 0.04) {
                    this.particles.firework(
                        this.camera.x + 150 + Math.random() * 660, 60 + Math.random() * 180);
                }
                this.stateTimer -= dt;
                if (this.stateTimer <= 0) {
                    if (this.levelIndex + 1 < LEVELS.length) this.loadLevel(this.levelIndex + 1);
                    else {
                        this.state = 'win';
                        this.stateTimer = 0;
                        this.saveBest();
                    }
                }
                break;
            case 'gameover':
                this.stateTimer -= dt;
                if (this.stateTimer <= 0 || this.input.justPressed('start')) this.state = 'title';
                break;
            case 'win':
                this.stateTimer -= dt;
                this.particles.update(dt);
                if (this.stateTimer <= 0) {
                    this.particles.firework(
                        this.camera.x + 150 + Math.random() * 660, 80 + Math.random() * 200);
                    this.stateTimer = 0.5;
                }
                if (this.input.justPressed('start')) this.state = 'title';
                break;
        }
    }

    updatePlaying(dt) {
        if (this.input.justPressed('start')) {
            this.state = 'paused';
            return;
        }

        const p = this.player;
        p.update(dt, this.input, this.level, this);

        // ファイアボール発射
        if (p.form === 'fire' && this.input.justPressed('run') && this.fireballs.length < 2) {
            this.fireballs.push(new Fireball(
                p.x + (p.facing > 0 ? p.w : -12), p.y + 14, p.facing));
            this.sound.fireball();
        }

        // タイルのコイン取得
        for (let row = Math.floor(p.y / TS); row <= Math.floor((p.y + p.h) / TS); row++) {
            for (let col = Math.floor(p.x / TS); col <= Math.floor((p.x + p.w) / TS); col++) {
                if (this.level.tileAt(col, row) === T.COIN) {
                    this.level.setTile(col, row, T.EMPTY);
                    this.addCoin(col * TS + TS / 2, row * TS + TS / 2);
                }
            }
        }

        // 敵
        for (const e of this.enemies) {
            if (!e.active) {
                e.active = e.x < this.camera.x + this.camera.viewW + 64;
                continue;
            }
            e.update(dt, this.level, p, this);
            if (e.removed || !e.alive || p.dead) continue;
            if (!this.overlap(p, e)) continue;

            const stomping = p.vy > 0 && p.y + p.h - e.y < e.h * 0.6;
            if (e instanceof Kame && e.state === 'shell' && !stomping) {
                e.kick(this, p.x + p.w / 2 < e.x + e.w / 2 ? 1 : -1);
            } else if (stomping) {
                e.stomp(this, p);
                p.stompBounce(this.input.held('jump'));
                this.particles.puff(p.x + p.w / 2, e.y);
            } else if (p.invuln <= 0 && !(e.ignorePlayer > 0)) {
                const died = p.hurt();
                if (died) this.startDeath();
                else this.sound.hurt();
            }
        }
        // 滑る甲羅 vs 他の敵
        for (const shell of this.enemies) {
            if (!(shell instanceof Kame) || shell.state !== 'sliding' || !shell.alive) continue;
            for (const e of this.enemies) {
                if (e === shell || !e.alive || e.flipped || !e.active) continue;
                if (this.overlap(shell, e)) {
                    e.flip(this, shell.dir);
                    this.sound.kick();
                }
            }
        }
        this.enemies = this.enemies.filter((e) => !e.removed);

        // アイテム
        for (const it of this.items) {
            it.update(dt, this.level);
            if (it.removed || it instanceof CoinPop) continue;
            if (it.w !== undefined && this.overlap(p, it)) {
                it.removed = true;
                if (it instanceof Mushroom && it.kind === 'life') {
                    this.lives++;
                    this.sound.oneUp();
                    this.popups.push(new ScorePopup(it.x, it.y, '1UP!'));
                } else {
                    // フラワーはどの状態からでもファイアまろんになれる
                    if (it instanceof Flower) p.setForm('fire');
                    else if (p.form === 'small') p.setForm('big');
                    this.sound.powerup();
                    this.addScore(1000, it.x, it.y);
                }
            }
        }
        this.items = this.items.filter((it) => !it.removed);

        // ファイアボール
        for (const f of this.fireballs) {
            f.update(dt, this.level);
            for (const e of this.enemies) {
                if (!e.alive || e.flipped || !e.active || f.removed) continue;
                if (this.overlap(f, e)) {
                    f.removed = true;
                    if (e.hitByFireball) e.hitByFireball(this);
                    else e.flip(this, Math.sign(f.vx) || 1);
                    this.particles.sparkle(e.x + e.w / 2, e.y + e.h / 2, '#ff9f1c');
                    this.sound.kick();
                }
            }
        }
        this.fireballs = this.fireballs.filter((f) => !f.removed);

        this.popups.forEach((s) => s.update(dt));
        this.popups = this.popups.filter((s) => !s.removed);
        this.particles.update(dt);

        // ブロックのバウンド演出
        this.bumps.forEach((b) => (b.t += dt * 8));
        this.bumps = this.bumps.filter((b) => b.t < Math.PI);

        this.camera.follow(p, this.level, dt);

        // 残り時間
        this.time -= dt;
        if (this.time <= 0 && !p.dead) {
            p.invuln = 0;
            p.form = 'small';
            p.hurt();
            this.startDeath();
        }

        // 穴に落ちた
        if (p.y > this.level.pixelHeight + 60 && !p.dead) {
            p.dead = true;
            this.startDeath();
        }

        // ゴールの旗に到達
        if (!this.level.bossLevel && p.x + p.w >= this.level.flagX * TS + 12 && !p.dead) {
            this.startFlag();
        }
    }

    onBossDefeated() {
        // 飛んでいるハートを消して勝利演出へ
        this.enemies = this.enemies.filter((e) => !(e instanceof HeartShot));
        this.state = 'bossclear';
        this.stateTimer = 5;
        this.sound.clear();
    }

    startDeath() {
        this.state = 'dying';
        this.stateTimer = 2.2;
        this.player.dead = true;
        this.player.vy = -560;
        this.player.vx = 0;
        this.sound.die();
    }

    startFlag() {
        const p = this.player;
        this.state = 'flag';
        p.frozen = true;
        p.vx = 0;
        p.vy = 0;
        p.x = this.level.flagX * TS + TS / 2 - p.w - 2;
        const heightTiles = Math.max(1, Math.round((GROUND_Y * TS - (p.y + p.h)) / TS));
        this.addScore(heightTiles * 100, p.x, p.y);
        this.flagY = (GROUND_Y - 11) * TS + 16;
        this.sound.stopMusic();
        this.sound.flagpole();
    }

    updateFlag(dt) {
        const p = this.player;
        const bottom = GROUND_Y * TS;
        p.y = Math.min(p.y + 240 * dt, bottom - p.h);
        this.flagY = Math.min(this.flagY + 240 * dt, bottom - 60);
        this.camera.follow(p, this.level, dt);
        if (p.y >= bottom - p.h) {
            this.state = 'clearwalk';
            p.facing = 1;
        }
    }

    updateClearWalk(dt) {
        const p = this.player;
        p.x += 150 * dt;
        p.runAnim += dt * 8;
        p.vy = Math.min(p.vy + 2400 * dt, 900);
        p.y += p.vy * dt;
        const bottom = GROUND_Y * TS;
        if (p.y + p.h > bottom) {
            p.y = bottom - p.h;
            p.vy = 0;
        }
        this.camera.follow(p, this.level, dt);
        if (p.x > this.level.castleX * TS + 70) {
            this.playerHidden = true;
            this.state = 'clear';
            this.stateTimer = 3.2;
            const bonus = Math.ceil(Math.max(0, this.time)) * 20;
            this.addScore(bonus);
            this.time = 0;
            this.sound.clear();
        }
    }

    saveBest() {
        if (this.score > this.best) {
            this.best = this.score;
            localStorage.setItem('maron-best', String(this.best));
        }
    }

    overlap(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    // ---------- 描画 ----------
    render() {
        const c = this.ctx;
        c.clearRect(0, 0, this.canvas.width, this.canvas.height);

        if (this.state === 'title') {
            this.renderTitle(c);
            return;
        }

        const level = this.level;
        const th = THEMES[level.theme];
        const camX = this.camera.offsetX();

        // 空
        c.fillStyle = th.sky;
        c.fillRect(0, 0, this.canvas.width, this.canvas.height);

        // 星空 (夜と地下)
        if (level.theme === 'night' || level.theme === 'underground') {
            c.fillStyle = level.theme === 'night' ? '#ffffffcc' : '#ffffff22';
            for (let i = 0; i < 60; i++) {
                const sx = ((i * 137 + 61) % (this.canvas.width + 100)) - (camX * 0.15) % (this.canvas.width + 100);
                const x = (sx + this.canvas.width + 100) % (this.canvas.width + 100) - 50;
                const y = (i * 71 + 23) % 320;
                const tw = Math.sin(this.elapsed * 2 + i) > 0.4 ? 2.4 : 1.4;
                c.fillRect(x, y, tw, tw);
            }
        }

        // 背景の装飾 (パララックス)
        const groundLine = GROUND_Y * TS;
        for (const d of level.decor) {
            if (d.kind === 'hill') drawHill(c, d.x - camX * 0.85, groundLine, 1 + (d.x % 3) * 0.25, th);
        }
        for (const d of level.decor) {
            if (d.kind === 'cloud') drawCloud(c, d.x - camX * 0.55, 60 + d.extra * 38, 0.8 + d.extra * 0.25, th.cloud);
            if (d.kind === 'bush') drawBush(c, d.x - camX, groundLine, th);
            if (d.kind === 'window') drawWindow(c, d.x - camX * 0.8, 110 + d.extra * 50);
            if (d.kind === 'clock') drawClock(c, d.x - camX * 0.8, 70, this.elapsed + d.x);
            if (d.kind === 'plant') drawPlant(c, d.x - camX, groundLine);
        }

        // 城と旗 (ボス面にはなし)
        if (!level.bossLevel) {
            if (level.theme === 'office') drawElevator(c, level.castleX * TS - camX, groundLine);
            else drawCastle(c, level.castleX * TS - camX, groundLine);
            const flagBaseY = this.state === 'flag' || this.state === 'clearwalk' || this.state === 'clear' || this.flagDone
                ? (this.flagY ?? (GROUND_Y - 10) * TS)
                : (GROUND_Y - 11) * TS + 16;
            drawFlag(c, level.flagX * TS + TS / 2 - 3 - camX, flagBaseY);
        }

        // ブロックからせり上がり中のアイテムはタイルの後ろに描く
        for (const it of this.items) {
            if (it.emerge > 0) it.render(c, camX);
        }

        // タイル
        const c0 = Math.floor(camX / TS);
        const c1 = Math.min(level.width - 1, c0 + Math.ceil(this.canvas.width / TS) + 1);
        for (let col = c0; col <= c1; col++) {
            for (let row = 0; row < 17; row++) {
                const id = level.tileAt(col, row);
                if (!id) continue;
                let dy = 0;
                for (const b of this.bumps) {
                    if (b.col === col && b.row === row) dy = -Math.sin(b.t) * 9;
                }
                drawTile(c, id, col * TS - camX, row * TS + dy, level.theme, this.elapsed);
            }
        }

        // エンティティ
        for (const it of this.items) {
            if (!(it.emerge > 0)) it.render(c, camX);
        }
        for (const e of this.enemies) e.render(c, camX);
        for (const f of this.fireballs) f.render(c, camX);
        if (!this.playerHidden) this.player.render(c, camX, this.elapsed);
        this.particles.render(c, camX);
        for (const s of this.popups) s.render(c, camX);

        this.hud.render(c, this);

        // 状態別オーバーレイ
        if (this.state === 'paused') this.overlayText(c, 'PAUSE', 'ENTER で再開');
        if (this.state === 'gameover') this.overlayText(c, 'GAME OVER', `SCORE ${this.score}`);
        if (this.state === 'clear' && this.levelIndex + 1 >= LEVELS.length) {
            // 最終面クリアの瞬間は何も出さない (win 画面へ)
        } else if (this.state === 'clear') {
            this.overlayText(c, 'COURSE CLEAR!', 'タイムボーナス獲得!');
        }
        if (this.state === 'bossclear') {
            this.overlayText(c, '🎀 なかなおり! 🎀', 'ゆいちゃんと なかよくなった!');
        }
        if (this.state === 'win') {
            this.overlayText(c, '🎉 ALL CLEAR! 🎉',
                `まろんは平和を取り戻した!  SCORE ${this.score}  /  BEST ${this.best}`,
                'ENTER でタイトルへ');
        }
    }

    overlayText(c, big, small, smaller) {
        c.fillStyle = 'rgba(0,0,0,0.55)';
        c.fillRect(0, 0, this.canvas.width, this.canvas.height);
        c.fillStyle = '#ffffff';
        c.textAlign = 'center';
        c.textBaseline = 'middle';
        c.font = 'bold 52px monospace';
        c.fillText(big, this.canvas.width / 2, 230);
        if (small) {
            c.font = 'bold 22px monospace';
            c.fillText(small, this.canvas.width / 2, 295);
        }
        if (smaller) {
            c.font = '16px monospace';
            c.fillText(smaller, this.canvas.width / 2, 340);
        }
    }

    renderTitle(c) {
        const w = this.canvas.width, h = this.canvas.height;
        const th = THEMES.overworld;
        c.fillStyle = th.sky;
        c.fillRect(0, 0, w, h);
        drawCloud(c, 90, 80, 1, '#fff');
        drawCloud(c, 600, 50, 1.3, '#fff');
        drawCloud(c, 800, 130, 0.8, '#fff');
        drawHill(c, 150, h - 64, 1.4, th);
        drawHill(c, 760, h - 64, 1, th);
        drawBush(c, 300, h - 64, th);
        drawBush(c, 660, h - 64, th);
        c.fillStyle = th.groundA;
        c.fillRect(0, h - 64, w, 64);
        c.fillStyle = th.groundTop;
        c.fillRect(0, h - 64, w, 5);

        // ロゴ
        c.textAlign = 'center';
        c.textBaseline = 'middle';
        c.fillStyle = 'rgba(0,0,0,0.25)';
        c.font = 'bold 64px monospace';
        c.fillText('SUPER MARON', w / 2 + 4, 144);
        c.fillText('WORLD', w / 2 + 4, 214);
        c.fillStyle = '#ffd24a';
        c.strokeStyle = '#8a4a10';
        c.lineWidth = 8;
        c.strokeText('SUPER MARON', w / 2, 140);
        c.strokeText('WORLD', w / 2, 210);
        c.fillText('SUPER MARON', w / 2, 140);
        c.fillText('WORLD', w / 2, 210);
        c.fillStyle = '#ffffff';
        c.font = 'bold 18px monospace';
        c.fillText('〜 まろんの大冒険 〜', w / 2, 262);

        // 主人公
        const img = sprites.dog.big.run1.right;
        const bounce = Math.abs(Math.sin(this.elapsed * 4)) * 14;
        c.drawImage(img, w / 2 - img.width, h - 64 - img.height * 2 - bounce, img.width * 2, img.height * 2);

        if (Math.floor(this.elapsed * 1.6) % 2 === 0) {
            c.fillStyle = '#ffffff';
            c.font = 'bold 24px monospace';
            c.fillText('PRESS ENTER / タップでスタート', w / 2, h - 130);
        }
        c.fillStyle = '#ffffffcc';
        c.font = '15px monospace';
        c.fillText(`BEST SCORE  ${String(this.best).padStart(7, '0')}`, w / 2, h - 92);
        c.fillStyle = '#ffffff88';
        c.font = '13px monospace';
        const stageHint = this.startLevel > 0 ? `▶ STAGE 1-${this.startLevel + 1} から開始` : '1〜4 キーでステージ選択 (4 = ボス戦)';
        c.fillText(stageHint, w / 2, h - 70);
    }

    // ---------- メインループ ----------
    frame(now) {
        const dt = Math.min(0.1, (now - this.last) / 1000);
        this.last = now;
        this.acc += dt;
        while (this.acc >= STEP) {
            this.update(STEP);
            this.input.update();
            this.acc -= STEP;
        }
        this.render();
        requestAnimationFrame((t) => this.frame(t));
    }
}

// デバッグ用にコンソールから触れるよう公開しておく
window.__MARON_GAME__ = new Game();

</script>
